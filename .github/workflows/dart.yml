name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build with Supabase & Google Sign-In
    runs-on: macos-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v3

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: 📥 Flutter pub get
        run: flutter pub get

      # ─── Google Services Setup ────────────────────────────────────────────
      - name: 🔑 Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      # ─── Supabase env injection ───────────────────────────────────────────
      - name: 🔐 Inject Supabase secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      # ─── CocoaPods ────────────────────────────────────────────────────────
      - name: 🍫 Install CocoaPods & pod install
        run: |
          gem install cocoapods
          pod repo update
          pod install
        working-directory: ios

      # ─── Build ───────────────────────────────────────────────────────────
      - name: 🔨 Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      # ─── Package IPA ─────────────────────────────────────────────────────
      - name: 📁 Create Payload folder
        run: mkdir Payload
        working-directory: build/ios/iphoneos

      - name: 📂 Move Runner.app into Payload
        run: mv Runner.app/ Payload
        working-directory: build/ios/iphoneos

      - name: 🗜️ Zip into .ipa
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      # ─── Release ─────────────────────────────────────────────────────────
      - name: 🚀 Upload IPA to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "iOS build with Supabase + Google Sign-In"
