name: iOS Unsigned IPA Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'

      - name: Flutter Clean
        run: |
          flutter clean
          flutter pub get

      - name: Install Pods
        run: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod repo update
          pod install

      - name: Build IPA
        run: flutter build ipa --release --no-codesign --verbose

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
