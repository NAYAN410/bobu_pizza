name: iOS-ipa-build

on:
  workflow_dispatch: # Manual run karne ke liye

jobs:
  build-ios:
    name: 🎉 Unsigned iOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: arm64

      # 1. Credentials injection (.env file configuration)
      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      # 2. Plist Injection
      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist

      # 3. Pub packages download karna
      - name: Flutter Pub Get
        run: flutter pub get

      # 4. Native iOS workspace structure ready karna
      - name: Auto-Generate iOS Workspace Config
        run: flutter build ios --config-only

      # 5. CocoaPods fresh installation
      - name: Pod Repo Update & Install
        run: |
          pod repo update
          pod install
        working-directory: ios

      # ERROR FIX: Xcode Code-Signing restriction ko simulator framework target se completely bypass karna
      - name: Build Unsigned iOS Framework
        run: |
          flutter build ios --release --simulator --no-codesign

      # 6. AltStore/AltServer compatible format (.ipa) me bundle ready karna
      - name: Create IPA Structure & Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphonesimulator/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r FlutterIpaExport.ipa Payload

      # 7. Final Output File upload karna
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa
