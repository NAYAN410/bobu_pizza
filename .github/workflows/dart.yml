name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 Unsigned iOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: arm64

      # 1. Credentials injection (.env file configuration)
      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      # 2. Pub packages download karna
      - name: Flutter Pub Get
        run: flutter pub get

      # ERROR FIX 1: Bina build crash kiye sirf Podfile aur native configurations generate karna
      - name: Pre-initialize Flutter iOS Directory
        run: |
          flutter create . --platforms=ios

      # 3. CocoaPods dependencies refresh aur install karna
      - name: Pod Repo Update & Install
        run: |
          pod repo update
          pod install
        working-directory: ios

      # ERROR FIX 2: Direct framework build step bina kisi config-only checking ke
      - name: Build Unsigned Simulator App Bundle
        run: |
          flutter build ios --release --simulator --no-codesign -- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # 4. Generated App bundle ko AltStore format (.ipa) me convert karna
      - name: Create IPA Structure & Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphonesimulator/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r FlutterIpaExport.ipa Payload

      # 5. Output File download ke liye Artifacts me bhejna
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa
