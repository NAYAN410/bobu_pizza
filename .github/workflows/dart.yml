name: iOS-ipa-build

on:
  workflow_dispatch: # Manual run karne ke liye

jobs:
  build-ios:
    name: 🎉 Unsigned iOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: arm64

      # 1. Credentials injection (.env file create karna)
      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      # 2. Pub packages download karna
      - name: Flutter Pub Get
        run: flutter pub get

      # 3. Native iOS workspace configuration ready karna
      - name: Auto-Generate iOS Workspace Config
        run: flutter build ios --config-only

      # 4. CocoaPods fresh installation (Ab Google Sign-In nahi hai to error nahi aayega)
      - name: Pod Repo Update & Install
        run: |
          pod repo update
          pod install
        working-directory: ios

      # 5. Flutter assets ko binary folder me map karna
      - name: Build Flutter Bundle Assets
        run: flutter build bundle

      # ERROR FIX: Direct native compiler engine se Simulator target par building trigger karna (Codesign Bypass)
      - name: Build Unsigned iOS Framework via Xcode Build Tool
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      # 6. Unsigned application binary ko AltStore (.ipa) compatible layout me pack karna
      - name: Create IPA Structure & Package
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphonesimulator/Runner.app build/ios/iphoneos/Payload/ || cp -R build/ios/iphonesimulator/Build/Intermediates.noindex/ArchiveIntermediates/Runner/InstallationBuildProductsLocation/Applications/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r FlutterIpaExport.ipa Payload

      # 7. Final .ipa file upload karna (Jise AltServer se install karenge)
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa
