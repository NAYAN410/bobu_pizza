name: Flutter iOS Unsigned IPA Build

on:
  push:
    branches:
      - master # Aapka active branch yahan set kar diya hai
  workflow_dispatch: # Isse aap GitHub web dashboard se manually bhi run kar sakte hain

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      # 1. GitHub repository se code pull karna
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Supabase credentials ke liye .env file create karna
      - name: Create .env file from Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      # 3. Google Sign-In ke liye plist file config folder me generate karna
      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist

      # 4. Java SDK setup karna (Required for certain internal tasks)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Flutter SDK environment ready karna
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # Apne exact version ke hisab se ise badal sakte hain
          channel: 'stable'
          cache: true

      # 6. Pub packages code me pull karna
      - name: Install Dependencies
        run: flutter pub get

      # 7. iOS build ko compile karna bina Apple Developer credentials ke
      - name: Build iOS Application (No Code Sign)
        run: |
          flutter build ios --release --no-codesign

      # 8. Compile bundle (.app) ko zip karke AltStore compatible .ipa banana
      - name: Package Unsigned IPA for AltStore
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AltStore-Runner.ipa Payload
          rm -rf Payload

      # 9. Final build file download ke liye artifact section me bhejna
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testing-ipa
          path: AltStore-Runner.ipa
          if-no-files-found: error
