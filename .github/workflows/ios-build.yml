name: Flutter iOS Unsigned IPA Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      # ERROR FIX 1: Environment constraint ko active Dart SDK (3.6.2) ke cross-compatible banana
      - name: Fix SDK Constraint in pubspec.yaml
        run: |
          sed -i '' '/environment:/,/sdk:/ s/sdk:.*/sdk: ">=3.6.0 <4.0.0"/' pubspec.yaml

      # ERROR FIX 2: flutter_lints dependency version mismatch ko clean solve karna
      - name: Patch flutter_lints version for compatibility
        run: |
          sed -i '' 's/flutter_lints: .*/flutter_lints: any/' pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Application (No Code Sign)
        run: |
          flutter build ios --release --no-codesign

      - name: Package Unsigned IPA for AltStore
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r AltStore-Runner.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testing-ipa
          path: AltStore-Runner.ipa
          if-no-files-found: error
