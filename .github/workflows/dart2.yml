name: Flutter iOS Unsigned Build for AltStore

on:
  push:
    branches: [ "main" ] # Aapki default branch ka naam agar alag hai toh wo likhein
  workflow_dispatch: # Isse aap GitHub par ja kar manually bhi run kar sakte hain

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Inject Configuration and Secrets
        run: |
          # GoogleService-Info.plist ko sahi jagah generate karna
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist
          
          # Supabase credentials ko .env me daalna
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install --jobs=4
          cd ..

      # Windows users ke liye best trick: Bina code-sign ke build nikalna
      - name: Build iOS App Framework
        run: |
          flutter build ios --release --no-codesign

      # AltStore ke liye manual .ipa structure ready karna (Payload folder trick)
      - name: Create Unsigned .ipa File
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload

      # Generated .ipa file ko GitHub Artifacts me upload karna
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: flutter-unsigned-ipa
          path: Runner.ipa
