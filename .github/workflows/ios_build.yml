name: iOS unsigned device IPA (for AltServer)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS device IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Pod Repo Update
        working-directory: ios
        run: pod repo update

      - name: Patch project.pbxproj — disable ALL signing
        run: |
          perl -0777 -pe '
            s/CODE_SIGN_STYLE\s*=\s*Automatic\s*;/CODE_SIGN_STYLE = Manual;/g;
            s/DEVELOPMENT_TEAM\s*=\s*[^;]*;/DEVELOPMENT_TEAM = "";/g;
            s/CODE_SIGNING_ALLOWED\s*=\s*YES;/CODE_SIGNING_ALLOWED = NO;/g;
            s/CODE_SIGNING_REQUIRED\s*=\s*YES;/CODE_SIGNING_REQUIRED = NO;/g;
            s/PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g;
            s/CODE_SIGN_IDENTITY\s*=\s*[^;]*;/CODE_SIGN_IDENTITY = "";/g;
            s/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]"\s*=\s*[^;]*;/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g;
          ' -i ios/Runner.xcodeproj/project.pbxproj

          echo "---- Patch check ----"
          grep -n "CODE_SIGN_IDENTITY" ios/Runner.xcodeproj/project.pbxproj | head -5 || true

      - name: Build Flutter iOS release (force no signing via env)
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          DEVELOPMENT_TEAM: ""
        run: |
          flutter pub get

          # Use xcode build settings override via env + flutter flag together
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=FLUTTER_BUILD_MODE=release \
            2>&1 || true

          echo ""
          echo "---- Runner.app search ----"
          find "$PWD/build/ios" -name "Runner.app" -type d 2>/dev/null || true

          echo ""
          echo "---- build/ios contents ----"
          ls -la "$PWD/build/ios/" 2>/dev/null || true

      - name: Package unsigned IPA
        run: |
          set -e

          APP_PATH=$(find "$PWD/build/ios" -name "Runner.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found!"
            exit 1
          fi

          APP_KB=$(du -sk "$APP_PATH" | cut -f1)
          echo "✅ Runner.app at: $APP_PATH"
          echo "✅ Size: ${APP_KB} KB"

          if [ "$APP_KB" -lt 10000 ]; then
            echo "⚠️  App too small — checking what's inside:"
            ls -la "$APP_PATH/" || true

            echo ""
            echo "---- Checking for Flutter.framework ----"
            find "$PWD/build/ios" -name "Flutter" -o -name "App.framework" 2>/dev/null | head -10 || true

            # Try to find Flutter artifacts and inject them
            FLUTTER_FRAMEWORK=$(find "$PWD/build/ios" -name "Flutter" -type f 2>/dev/null | head -1)
            APP_FRAMEWORK=$(find "$PWD/build/ios" -name "App.framework" -type d 2>/dev/null | head -1)

            if [ -n "$APP_FRAMEWORK" ]; then
              echo "Found App.framework at $APP_FRAMEWORK — copying into Runner.app"
              cp -R "$APP_FRAMEWORK" "$APP_PATH/Frameworks/" 2>/dev/null || true
            fi

            APP_KB=$(du -sk "$APP_PATH" | cut -f1)
            echo "Size after injection attempt: ${APP_KB} KB"
          fi

          IPA_DIR="$PWD/build/ios/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"
          cd "$IPA_DIR"
          zip -r unsigned-device.ipa Payload/

          echo "✅ IPA Size: $(du -sh unsigned-device.ipa | cut -f1)"

      - name: Upload Unsigned Device IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-device
          path: build/ios/ipa/unsigned-device.ipa
