name: iOS unsigned device IPA (for AltServer)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS device IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Pod Repo Update
        working-directory: ios
        run: pod repo update

      - name: Patch project.pbxproj — disable all signing
        run: |
          set -e
          cp ios/Runner.xcodeproj/project.pbxproj ios/Runner.xcodeproj/project.pbxproj.bak

          perl -0777 -pe '
            s/CODE_SIGN_STYLE\s*=\s*Automatic\s*;/CODE_SIGN_STYLE = Manual;/g;
            s/DEVELOPMENT_TEAM\s*=\s*[^;]*;/DEVELOPMENT_TEAM = "";/g;
            s/CODE_SIGNING_ALLOWED\s*=\s*YES;/CODE_SIGNING_ALLOWED = NO;/g;
            s/CODE_SIGNING_REQUIRED\s*=\s*YES;/CODE_SIGNING_REQUIRED = NO;/g;
            s/PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g;
            s/CODE_SIGN_IDENTITY\s*=\s*[^;]*;/CODE_SIGN_IDENTITY = "";/g;
          ' -i ios/Runner.xcodeproj/project.pbxproj

          echo "---- Signing patch applied ----"
          grep -n "CODE_SIGN_IDENTITY" ios/Runner.xcodeproj/project.pbxproj | head -5 || true

      - name: Build iOS with xcodebuild directly (no flutter build)
        run: |
          set -e

          # Generate Flutter files first (no xcode involved)
          flutter pub get
          dart run flutter_launcher_icons 2>/dev/null || true

          # Let Flutter generate its xcconfig and plugin registrant
          flutter build ios --config-only 2>/dev/null || true

          DERIVED_DATA="$PWD/build/ios/DerivedData"

          # Build directly with xcodebuild, force all signing off at CLI level
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            FLUTTER_BUILD_MODE=release \
            FLUTTER_ROOT="$(flutter --version 2>/dev/null | head -1 || echo '')" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build 2>&1 | tail -50

          echo "---- Searching for Runner.app ----"
          find "$DERIVED_DATA" -name "Runner.app" -type d 2>/dev/null

      - name: Package unsigned IPA
        run: |
          set -e

          DERIVED_DATA="$PWD/build/ios/DerivedData"
          APP_PATH=$(find "$DERIVED_DATA" -name "Runner.app" -type d | grep -v simulator | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found!"
            find "$DERIVED_DATA" -type d -name "*.app" | head -10 || true
            exit 1
          fi

          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "✅ Runner.app at: $APP_PATH"
          echo "✅ Size: $APP_SIZE"

          IPA_DIR="$PWD/build/ios/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"
          cd "$IPA_DIR"
          zip -r unsigned-device.ipa Payload/

          echo "✅ IPA Size: $(du -sh unsigned-device.ipa | cut -f1)"

      - name: Upload Unsigned Device IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-device
          path: build/ios/ipa/unsigned-device.ipa
