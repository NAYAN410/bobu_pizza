name: iOS unsigned device IPA (for AltServer)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS device IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Pod Repo Update
        working-directory: ios
        run: pod repo update

      - name: Patch project.pbxproj — disable all signing
        run: |
          set -e
          cp ios/Runner.xcodeproj/project.pbxproj ios/Runner.xcodeproj/project.pbxproj.bak

          perl -0777 -pe '
            s/CODE_SIGN_STYLE\s*=\s*Automatic\s*;/CODE_SIGN_STYLE = Manual;/g;
            s/DEVELOPMENT_TEAM\s*=\s*[^;]*;/DEVELOPMENT_TEAM = "";/g;
            s/CODE_SIGNING_ALLOWED\s*=\s*YES;/CODE_SIGNING_ALLOWED = NO;/g;
            s/CODE_SIGNING_REQUIRED\s*=\s*YES;/CODE_SIGNING_REQUIRED = NO;/g;
            s/PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g;
            s/CODE_SIGN_IDENTITY\s*=\s*[^;]*;/CODE_SIGN_IDENTITY = "";/g;
          ' -i ios/Runner.xcodeproj/project.pbxproj

          echo "---- Signing diagnostics ----"
          grep -n "CODE_SIGN"        ios/Runner.xcodeproj/project.pbxproj | head -10 || true
          grep -n "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | head -5  || true

      - name: Generate Flutter build files (flutter assemble)
        run: |
          set -e
          # This generates the necessary Flutter.framework and build files
          # without triggering xcodebuild's signing check
          flutter build ios --no-codesign --release || true

          # Check if the error is ONLY about signing (then we can continue)
          # The actual .app may still be built by xcodebuild below
          echo "Flutter build step done (signing error above is expected, continuing...)"

      - name: Build with xcodebuild (force no signing)
        run: |
          set -e

          flutter pub get

          # Run xcodebuild directly — override ALL signing at command line level
          # This takes priority over project settings
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios/DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcpretty || true

          echo "---- Checking for Runner.app ----"
          find build/ios/DerivedData -name "Runner.app" -type d 2>/dev/null || true

      - name: Package unsigned IPA
        run: |
          set -e

          # Find Runner.app in DerivedData
          APP_PATH=$(find "$PWD/build/ios/DerivedData" -name "Runner.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found in DerivedData"
            echo "---- DerivedData contents ----"
            find "$PWD/build/ios/DerivedData" -type d | head -30 || true
            exit 1
          fi

          echo "✅ Found Runner.app at: $APP_PATH"

          IPA_DIR="$PWD/build/ios/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"

          cd "$IPA_DIR"
          zip -r unsigned-device.ipa Payload/

          echo "✅ IPA created:"
          ls -lh "$IPA_DIR/"

      - name: Upload Unsigned Device IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-device
          path: build/ios/ipa/unsigned-device.ipa
