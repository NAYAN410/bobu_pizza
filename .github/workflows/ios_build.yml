name: iOS unsigned device IPA (for AltServer)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS device IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Pod Repo Update
        working-directory: ios
        run: pod repo update

      - name: Patch project.pbxproj — disable ALL signing
        run: |
          # Fix regular settings
          perl -0777 -pe '
            s/CODE_SIGN_STYLE\s*=\s*Automatic\s*;/CODE_SIGN_STYLE = Manual;/g;
            s/DEVELOPMENT_TEAM\s*=\s*[^;]*;/DEVELOPMENT_TEAM = "";/g;
            s/CODE_SIGNING_ALLOWED\s*=\s*YES;/CODE_SIGNING_ALLOWED = NO;/g;
            s/CODE_SIGNING_REQUIRED\s*=\s*YES;/CODE_SIGNING_REQUIRED = NO;/g;
            s/PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g;
            s/CODE_SIGN_IDENTITY\s*=\s*[^;]*;/CODE_SIGN_IDENTITY = "";/g;
          ' -i ios/Runner.xcodeproj/project.pbxproj

          # Also fix the sdk-specific signing lines like:
          # "CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "iPhone Developer";
          perl -0777 -pe '
            s/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]"\s*=\s*[^;]*;/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g;
          ' -i ios/Runner.xcodeproj/project.pbxproj

          echo "---- Signing diagnostics ----"
          grep -n "CODE_SIGN_IDENTITY" ios/Runner.xcodeproj/project.pbxproj | head -10 || true
          grep -n "DEVELOPMENT_TEAM"   ios/Runner.xcodeproj/project.pbxproj | head -5  || true

      - name: Build Flutter iOS (no codesign)
        run: |
          flutter pub get
          flutter build ios --release --no-codesign 2>&1 || true

          echo ""
          echo "---- Searching for Runner.app ----"
          find "$PWD/build" -name "Runner.app" -type d 2>/dev/null || echo "Not found in build/"

      - name: Package unsigned IPA
        run: |
          set -e

          APP_PATH=$(find "$PWD/build" -name "Runner.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found!"
            echo "---- build/ contents ----"
            find "$PWD/build" -type d | head -30 || true
            exit 1
          fi

          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "✅ Runner.app at: $APP_PATH"
          echo "✅ Size: $APP_SIZE"

          # Fail if app is suspiciously small (means empty)
          APP_BYTES=$(du -sk "$APP_PATH" | cut -f1)
          if [ "$APP_BYTES" -lt 10000 ]; then
            echo "❌ Runner.app is too small ($APP_BYTES KB) — build likely failed silently"
            exit 1
          fi

          IPA_DIR="$PWD/build/ios/ipa"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/Runner.app"
          cd "$IPA_DIR"
          zip -r unsigned-device.ipa Payload/

          echo "✅ IPA Size: $(du -sh unsigned-device.ipa | cut -f1)"

      - name: Upload Unsigned Device IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-device
          path: build/ios/ipa/unsigned-device.ipa
