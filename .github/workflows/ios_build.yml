name: iOS unsigned device IPA (for AltServer)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned iOS device IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Create .env File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Pod Repo Update
        working-directory: ios
        run: pod repo update

      - name: Force-disable code signing in project.pbxproj (CI injection)
        run: |
          set -e
          
          # Backup original
          cp ios/Runner.xcodeproj/project.pbxproj ios/Runner.xcodeproj/project.pbxproj.bak || true

          # Force CODE_SIGN_STYLE = Manual and clear signing identities/teams
          perl -0777 -pe '
            s/CODE_SIGN_STYLE\s*=\s*Automatic\s*;/CODE_SIGN_STYLE = Manual;/g;
            s/DEVELOPMENT_TEAM\s*=\s*[^;]*;/DEVELOPMENT_TEAM = "";/g;
            s/CODE_SIGNING_ALLOWED\s*=\s*YES;/CODE_SIGNING_ALLOWED = NO;/g;
            s/CODE_SIGNING_REQUIRED\s*=\s*YES;/CODE_SIGNING_REQUIRED = NO;/g;
            s/PROVISIONING_PROFILE_SPECIFIER\s*=\s*[^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g;
          ' -i ios/Runner.xcodeproj/project.pbxproj || true

          echo "---- Signing diagnostics (after patching) ----"
          grep -n "CODE_SIGN_STYLE" ios/Runner.xcodeproj/project.pbxproj | head -5 || true
          grep -n "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | head -5 || true

      - name: Build unsigned device IPA (for AltServer)
        run: |
          set -e
          flutter clean
          flutter pub get

          # Prepare Flutter iOS project without codesign
          flutter build ios --no-codesign --release

          mkdir -p build/ios/archive
          ARCHIVE_PATH="$PWD/build/ios/archive/Runner.xcarchive"
          EXPORT_PATH="$PWD/build/ios/ipa"

          # Archive the project while forcing no signing
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            DEVELOPMENT_TEAM="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" || true

          # Prepare exportOptions.plist with signingStyle none
          cat > exportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key><false/>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>none</string>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF

          # Try exporting an unsigned IPA
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            || true

          # If export produced an .ipa, copy it; otherwise fallback to packaging unsigned .app
          if ls "$EXPORT_PATH"/*.ipa 1> /dev/null 2>&1; then
            mkdir -p build/ios/ipa
            cp "$EXPORT_PATH"/*.ipa build/ios/ipa/ || true
          else
            echo "No IPA produced by exportArchive — creating unsigned .ipa from .app as fallback"
            if [ -d build/ios/iphoneos/Runner.app ]; then
              mkdir -p build/ios/ipa/Payload
              cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
              (cd build/ios/ipa && zip -r unsigned-device.ipa Payload) || true
              mkdir -p build/ios/ipa
              mv build/ios/ipa/unsigned-device.ipa build/ios/ipa/ 2>/dev/null || true
            else
              echo "Fallback .app not found at build/ios/iphoneos/Runner.app"
            fi
          fi

      - name: Upload Unsigned Device IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-device
          path: build/ios/ipa/*.ipa
